<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MakeMyDay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 640px;
            width: 100%;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .date {
            font-size: 14px;
            color: #888;
        }

        .briefing-text {
            font-size: 16px;
            line-height: 1.7;
            color: #333;
            min-height: 120px;
        }

        .loading {
            color: #aaa;
            font-style: italic;
        }

        .error {
            color: #c0392b;
        }

        .refresh-btn {
            margin-top: 32px;
            padding: 10px 20px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .refresh-btn:hover { opacity: 0.8; }
        .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Good morning ☀️</h1>
            <span class="date" id="date"></span>
        </div>
        <div class="briefing-text loading" id="briefing">
            Fetching your briefing...
        </div>
        <div style="margin-top: 24px;">
            <audio id="audio-player" controls style="width: 100%; display: none;"></audio>
            <button class="refresh-btn" id="audio-btn" onclick="fetchAudio()" style="background: #333; margin-top: 8px;">
                Listen to briefing
            </button>
        </div>
        <button class="refresh-btn" id="btn" onclick="fetchBriefing()">
            Refresh briefing
        </button>
    </div>

    <script>
        document.getElementById('date').textContent = new Date().toLocaleDateString('en-GB', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        async function fetchBriefing() {
            const el = document.getElementById('briefing');
            const btn = document.getElementById('btn');

            el.className = 'briefing-text loading';
            el.textContent = 'Fetching your briefing...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/briefing');
                const data = await res.json();
                el.className = 'briefing-text';
                el.textContent = data.briefing;
            } catch (err) {
                el.className = 'briefing-text error';
                el.textContent = 'Something went wrong. Try refreshing.';
            } finally {
                btn.disabled = false;
            }
        }

        fetchBriefing();

        async function fetchAudio() {
            const btn = document.getElementById('audio-btn');
            const player = document.getElementById('audio-player');

            btn.disabled = true;
            btn.textContent = 'Generating audio...';

            try {
                const res = await fetch('/audio');
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                player.src = url;
                player.style.display = 'block';
                player.play();
                btn.textContent = 'Regenerate audio';
            } catch (err) {
                btn.textContent = 'Audio failed — try again';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
